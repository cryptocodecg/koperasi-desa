<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi Koperasi — Kemenkop RI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --gray:#5F5E5A;--gray-light:#F1EFE8;--gray-border:#D3D1C7;
  --bg:#ffffff;--bg2:#F8F8F6;
  --text:#1a1a18;--text2:#5F5E5A;--text3:#888780;
  --border:#E0DDD6;--r:10px;--rl:14px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}
#app{max-width:700px;margin:0 auto;padding:1rem}

/* HEADER */
.hdr{background:var(--green);border-radius:var(--rl);padding:.875rem 1.25rem;margin-bottom:1rem;color:#fff;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:.75rem}
.hdr-logo{font-size:22px}
.hdr-title{font-size:13px;font-weight:700;line-height:1.3}
.hdr-sub{font-size:11px;opacity:.8}
.hdr-phase{text-align:right}
.phase-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px}
.phase-name{font-size:13px;font-weight:600;margin-top:3px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.sc{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:.625rem .75rem;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
.sc.kas::after{background:var(--green)}
.sc.anggota::after{background:var(--blue)}
.sc.trust::after{background:var(--purple)}
.sc.bulan::after{background:var(--amber)}
.sc-label{font-size:10px;color:var(--text3);margin-bottom:3px}
.sc-val{font-size:19px;font-weight:700;line-height:1;color:var(--text)}
.sc-unit{font-size:10px;color:var(--text3);margin-top:2px}
.sc-bar{height:3px;background:var(--bg2);border-radius:2px;margin-top:5px;overflow:hidden}
.sc-bar-fill{height:100%;border-radius:2px;transition:width .4s,background .4s}

/* NARASI BOX */
.narasi{background:var(--blue-light);border:1px solid #B5D4F4;border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;gap:.875rem;align-items:flex-start}
.narasi-avatar{width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.narasi-body{}
.narasi-name{font-size:11px;font-weight:700;color:var(--blue-dark);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.narasi-text{font-size:13px;color:var(--blue-dark);line-height:1.65}
.narasi-text strong{font-weight:700}

/* MILESTONE BAR */
.milestone-bar{display:flex;gap:0;margin-bottom:1rem;overflow:hidden;border-radius:var(--r);border:1px solid var(--border)}
.ms{flex:1;padding:.5rem .25rem;text-align:center;font-size:10px;font-weight:600;color:var(--text3);background:var(--bg);border-right:1px solid var(--border);transition:all .3s;line-height:1.3}
.ms:last-child{border-right:none}
.ms.done{background:var(--green-light);color:var(--green-dark)}
.ms.active{background:var(--green);color:#fff}
.ms.locked{color:var(--gray-border)}

/* CARD */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:700;margin-bottom:.375rem;display:flex;align-items:center;gap:.5rem}
.card-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1rem}
.edu-box{background:var(--amber-light);border:1px solid #FAC775;border-radius:var(--r);padding:.75rem 1rem;margin-bottom:1rem;font-size:12px;color:var(--amber);line-height:1.6}
.edu-box strong{font-weight:700;color:var(--amber)}

/* FORM INPUT */
.input-group{margin-bottom:.875rem}
.input-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:.375rem;display:block}
.input-hint{font-size:11px;color:var(--text3);margin-bottom:.375rem}
input[type=text],input[type=number]{width:100%;padding:.625rem .875rem;border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
input:focus{border-color:var(--green)}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* CHOICES */
.choices{display:flex;flex-direction:column;gap:8px}
.choice{text-align:left;width:100%;padding:.875rem 1rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s}
.choice:hover{border-color:var(--green);background:var(--green-light)}
.choice-title{font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:3px}
.choice-hint{font-size:12px;color:var(--text3);display:block}
.choice-fx{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.fp{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.fp.pos{background:var(--green-light);color:var(--green-dark)}
.fp.neg{background:var(--red-light);color:var(--red)}
.fp.neu{background:var(--gray-light);color:var(--gray)}

/* RESULT */
.result{border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem;border:1px solid}
.result.pos{background:var(--green-light);border-color:#9FE1CB}
.result.neg{background:var(--red-light);border-color:#F7C1C1}
.result.neu{background:var(--gray-light);border-color:var(--gray-border)}
.result-title{font-size:15px;font-weight:700;margin-bottom:.5rem}
.result.pos .result-title{color:var(--green-dark)}
.result.neg .result-title{color:var(--red)}
.result.neu .result-title{color:var(--gray)}
.result-desc{font-size:13px;line-height:1.65}
.result.pos .result-desc{color:#0F6E56}
.result.neg .result-desc{color:var(--red)}
.result.neu .result-desc{color:var(--gray)}
.delta{display:flex;gap:6px;flex-wrap:wrap;margin-top:.75rem}
.dp{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600}
.dp.pos{background:#C0DD97;color:#27500A}
.dp.neg{background:#F7C1C1;color:#791F1F}
.dp.neu{background:var(--gray-border);color:#444441}
.learn-box{background:var(--blue-light);border:1px solid #B5D4F4;border-radius:var(--r);padding:.75rem 1rem;margin-top:.75rem;font-size:12px;color:var(--blue-dark);line-height:1.6}

/* BUTTONS */
.btn{width:100%;padding:.875rem;border:none;border-radius:var(--r);cursor:pointer;font-size:14px;font-weight:700;transition:all .15s;margin-top:.5rem}
.btn.primary{background:var(--green);color:#fff}
.btn.primary:hover{background:var(--green-dark)}
.btn.secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn.secondary:hover{background:var(--bg2)}
.btn.danger{background:var(--red);color:#fff}

/* PROGRESS STEP */
.step-indicator{display:flex;align-items:center;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-dot.done{background:var(--green);color:#fff}
.step-dot.active{background:var(--blue);color:#fff}
.step-dot.pending{background:var(--gray-light);color:var(--text3)}
.step-line{flex:1;height:2px;background:var(--border);min-width:12px}
.step-line.done{background:var(--green)}

/* ALLOC SLIDERS */
.alloc-row{margin-bottom:.875rem}
.alloc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.alloc-name{font-size:13px;font-weight:600}
.alloc-pct{font-size:13px;font-weight:700;min-width:40px;text-align:right}
.alloc-hint{font-size:11px;color:var(--text3);margin-top:3px}
input[type=range]{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;outline:none;background:var(--gray-light);cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--bg);border:2px solid var(--green);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.alloc-summary{background:var(--bg2);border-radius:var(--r);padding:.75rem 1rem;margin-top:.75rem}
.alloc-sum-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--text2)}
.alloc-sum-row.total{font-weight:700;color:var(--text);font-size:13px;border-top:1px solid var(--border);margin-top:4px;padding-top:6px}

/* SHU WATERFALL */
.wf-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem .875rem;border-radius:8px;font-size:13px;margin-bottom:4px}
.wf-row.gross{background:var(--purple-light);font-weight:700;color:var(--purple)}
.wf-row.cut{background:var(--red-light);color:var(--red)}
.wf-row.net{background:var(--green-light);font-weight:700;color:var(--green-dark)}
.wf-row.info{background:var(--gray-light);color:var(--gray)}

/* GAME OVER */
.gameover{text-align:center;padding:2rem 1rem}
.go-emoji{font-size:60px;display:block;margin-bottom:1rem}
.go-title{font-size:22px;font-weight:700;margin-bottom:.5rem}
.go-sub{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:1.5rem}
.go-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.go-stat{background:var(--bg2);border-radius:var(--r);padding:.75rem}
.go-stat-l{font-size:11px;color:var(--text3);margin-bottom:3px}
.go-stat-v{font-size:18px;font-weight:700}
.score-wrap{margin:1rem 0}
.score-num{font-size:52px;font-weight:700;color:var(--green);line-height:1}
.score-grade{display:inline-block;padding:.375rem 1.25rem;border-radius:20px;font-size:14px;font-weight:700;margin-top:.5rem}

/* NOTIF */
.notif{position:fixed;top:1rem;right:1rem;padding:.75rem 1.25rem;border-radius:var(--r);font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;max-width:280px;line-height:1.4}
.notif.show{opacity:1;transform:translateY(0)}
.notif.pos{background:var(--green);color:#fff}
.notif.neg{background:var(--red);color:#fff}
.notif.info{background:var(--blue);color:#fff}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo">🤝</div>
      <div>
        <div class="hdr-title" id="hdr-title">Simulasi Koperasi</div>
        <div class="hdr-sub">Kementerian Koperasi RI &bull; Program Digitalisasi Koperasi</div>
      </div>
    </div>
    <div class="hdr-phase">
      <div class="phase-badge">FASE</div>
      <div class="phase-name" id="phase-name">—</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="sc kas">
      <div class="sc-label">💰 Kas</div>
      <div class="sc-val" id="s-kas">0</div>
      <div class="sc-unit">juta rupiah</div>
      <div class="sc-bar"><div class="sc-bar-fill" id="bar-kas" style="width:0%;background:var(--green)"></div></div>
    </div>
    <div class="sc anggota">
      <div class="sc-label">👥 Anggota</div>
      <div class="sc-val" id="s-anggota">0</div>
      <div class="sc-unit">orang</div>
      <div class="sc-bar"><div class="sc-bar-fill" id="bar-anggota" style="width:0%;background:var(--blue)"></div></div>
    </div>
    <div class="sc trust">
      <div class="sc-label">⭐ Kepercayaan</div>
      <div class="sc-val" id="s-trust">0</div>
      <div class="sc-unit">/ 100</div>
      <div class="sc-bar"><div class="sc-bar-fill" id="bar-trust" style="width:0%;background:var(--purple)"></div></div>
    </div>
    <div class="sc bulan">
      <div class="sc-label">📅 Bulan</div>
      <div class="sc-val" id="s-bulan">0</div>
      <div class="sc-unit">/ 12</div>
      <div class="sc-bar"><div class="sc-bar-fill" id="bar-bulan" style="width:0%;background:var(--amber)"></div></div>
    </div>
  </div>

  <!-- MILESTONE -->
  <div class="milestone-bar" id="milestone-bar">
    <div class="ms locked" id="ms-0">Pendirian</div>
    <div class="ms locked" id="ms-1">Modal Awal</div>
    <div class="ms locked" id="ms-2">Operasional</div>
    <div class="ms locked" id="ms-3">Pengembangan</div>
    <div class="ms locked" id="ms-4">RAT &amp; SHU</div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main"></div>
</div>
<div class="notif" id="notif"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const G = {
  kas: 0, anggota: 0, trust: 50, bulan: 0,
  namaKoperasi: '', namaKetua: '',
  simpananPokok: 0, simpananWajib: 0,
  piutang: 0, surplus: 0, cadangan: 0,
  allocSP: 60, allocUsaha: 20, allocDep: 10,
  fase: 0, // 0=pendirian, 1=modal, 2=operasional, 3=pengembangan, 4=shu
  step: 0, // step dalam fase
  log: [],
  eventQueue: [],
  currentEvent: null,
  hasResult: false,
  currentChoice: null,
};

const FASE_NAMES = ['Pendirian','Modal Awal','Operasional','Pengembangan','RAT & SHU'];

// ─── EVENTS (fase 2 & 3) ─────────────────────────────────────────────────────
const EVENTS_OPS = [
  {id:'pinjam',tag:'Simpan Pinjam',
   title:'Permohonan Pinjaman Anggota',
   narasi:'Salah satu fungsi utama koperasi simpan pinjam adalah menyalurkan kredit kepada anggota dengan bunga yang terjangkau. Sebagai ketua, Anda harus menilai kelayakan setiap permohonan.',
   desc:'Pak Hendra (anggota aktif, 2 tahun) mengajukan pinjaman Rp 15 juta untuk modal usaha warung. Riwayat pembayaran simpanan wajib: lancar.',
   edu:'<strong>Prinsip kehati-hatian (prudential):</strong> Koperasi wajib memastikan kemampuan bayar peminjam. Standar aman: maksimal pinjaman = 3× simpanan anggota tersebut.',
   choices:[
     {label:'Setujui penuh — Rp 15 juta',hint:'Bunga 1,5%/bulan = Rp 225.000/bulan masuk kas',fx:{kas:-15,piutang:+15,trust:+8,surplus:+2},fxt:['neg','neu','pos','pos'],
      result:{type:'pos',title:'Pinjaman disetujui',desc:'Pak Hendra menerima pinjaman dan membuka warung. Cicilan berjalan lancar. Koperasi mendapat pendapatan bunga Rp 2 juta selama tenor pinjaman.',learn:'Bunga pinjaman adalah sumber pendapatan utama koperasi simpan pinjam. Penetapan bunga harus menutupi biaya operasional sekaligus tetap terjangkau bagi anggota.'}},
     {label:'Setujui sebagian — Rp 8 juta',hint:'Kompromi — risiko lebih kecil',fx:{kas:-8,piutang:+8,trust:+4,surplus:+1},fxt:['neg','neu','pos','pos'],
      result:{type:'neu',title:'Pinjaman sebagian disetujui',desc:'Pak Hendra dapat modal awal yang cukup untuk memulai usaha skala kecil. Ia berencana mengajukan tambahan setelah usaha berjalan.',learn:'Pencairan bertahap (droping) adalah praktik manajemen risiko yang baik — melindungi kas koperasi sekaligus tetap melayani anggota.'}},
     {label:'Tolak — kas terlalu rendah',hint:'Kas aman, tapi fungsi pelayanan berkurang',fx:{kas:0,piutang:0,trust:-10,surplus:0},fxt:['neu','neu','neg','neu'],
      result:{type:'neg',title:'Pinjaman ditolak',desc:'Pak Hendra kecewa. Ia terpaksa meminjam ke rentenir dengan bunga jauh lebih tinggi. Beberapa anggota mulai mempertanyakan manfaat koperasi.',learn:'Koperasi yang tidak bisa menyalurkan kredit kehilangan fungsi utamanya. Manajemen kas yang baik justru harus memastikan selalu ada dana untuk melayani anggota.'}}
   ]},
  {id:'cicilmacet',tag:'Manajemen Kredit',
   title:'Kredit Bermasalah (NPL)',
   narasi:'Non-Performing Loan (kredit macet) adalah salah satu risiko terbesar koperasi simpan pinjam. Penanganan yang tepat menentukan kesehatan keuangan koperasi.',
   desc:'Ibu Sari belum membayar cicilan selama 3 bulan, total tunggakan Rp 4,5 juta. Ia mengaku mengalami kesulitan setelah anaknya sakit dan butuh biaya pengobatan.',
   edu:'<strong>Klasifikasi kredit (OJK):</strong> Lancar (0 hari), Dalam Perhatian Khusus (1-90 hari), Kurang Lancar (91-120 hari), Diragukan (121-180 hari), Macet (>180 hari).',
   choices:[
     {label:'Restrukturisasi — perpanjang tenor 6 bulan',hint:'Cicilan lebih ringan, tanpa denda',fx:{kas:+2,piutang:-2,trust:+12,surplus:+1},fxt:['pos','pos','pos','pos'],
      result:{type:'pos',title:'Restrukturisasi berhasil',desc:'Ibu Sari lega dan berkomitmen membayar cicilan yang lebih kecil. Ia kembali aktif dalam kegiatan koperasi. Kepercayaan anggota meningkat karena koperasi dinilai manusiawi.',learn:'Restrukturisasi kredit adalah solusi terbaik yang menguntungkan kedua pihak. Koperasi tetap mendapat pembayaran, anggota tidak terjerat hutang yang makin besar.'}},
     {label:'Tagih dengan pendekatan kekeluargaan',hint:'Mediasi langsung dengan anggota',fx:{kas:+4,piutang:-4,trust:+6,surplus:+1},fxt:['pos','pos','pos','pos'],
      result:{type:'neu',title:'Penagihan berhasil',desc:'Ibu Sari berhasil melunasi tunggakan setelah dimediasi. Ia meminjam dari keluarga untuk membayar koperasi.',learn:'Pendekatan kekeluargaan sesuai dengan jati diri koperasi. Namun perlu dipastikan anggota benar-benar mampu bayar, bukan sekadar dipindah masalahnya.'}},
     {label:'Eksekusi jaminan',hint:'Sita aset jaminan untuk lunasi hutang',fx:{kas:+4,piutang:-4,trust:-15,surplus:0},fxt:['pos','pos','neg','neu'],
      result:{type:'neg',title:'Jaminan dieksekusi',desc:'Hutang lunas, tapi Ibu Sari dan keluarganya keluar dari koperasi. Cerita penyitaan menyebar dan beberapa anggota mempertanyakan sikap koperasi.',learn:'Eksekusi jaminan adalah opsi terakhir. Koperasi berbeda dari lembaga keuangan komersial — prinsip kekeluargaan dan kepedulian sosial harus tetap dijaga.'}}
   ]},
  {id:'rekrut',tag:'Keanggotaan',
   title:'Ekspansi Keanggotaan',
   narasi:'Pertumbuhan anggota adalah pertumbuhan modal koperasi. Setiap anggota baru membawa simpanan pokok dan simpanan wajib yang memperkuat fondasi keuangan koperasi.',
   desc:'Ada 12 warga desa yang tertarik bergabung setelah melihat manfaat koperasi. Mereka terdiri dari petani, pedagang kecil, dan ibu rumah tangga.',
   edu:'<strong>Simpanan pokok</strong> dibayar sekali saat masuk (tidak bisa ditarik). <strong>Simpanan wajib</strong> dibayar rutin setiap bulan. Keduanya membentuk modal tetap koperasi.',
   choices:[
     {label:'Rekrut semua 12 orang',hint:'Modal bertambah signifikan',fx:{kas:+6,piutang:0,trust:+10,surplus:0},fxt:['pos','neu','pos','neu'],
      result:{type:'pos',title:'12 anggota baru bergabung',desc:'Simpanan pokok 12 orang (@ Rp 500.000) = Rp 6 juta masuk kas. Simpanan wajib bulanan bertambah. Basis modal koperasi semakin kuat.',learn:'Setiap anggota baru = penambahan modal permanen. Koperasi dengan basis anggota luas lebih stabil dan punya daya tawar lebih besar.'}},
     {label:'Rekrut selektif — 6 anggota potensial',hint:'Kualitas lebih penting dari kuantitas',fx:{kas:+3,piutang:0,trust:+5,surplus:0},fxt:['pos','neu','pos','neu'],
      result:{type:'neu',title:'6 anggota terseleksi bergabung',desc:'Proses seleksi memastikan anggota yang masuk adalah mereka yang benar-benar berkomitmen. Tingkat keaktifan anggota koperasi terjaga.',learn:'Koperasi yang terlalu mudah menerima anggota berisiko punya banyak anggota pasif yang tidak berkontribusi tapi menuntut hak SHU.'}},
     {label:'Tunda — perlu AD/ART direvisi dulu',hint:'Proses administrasi harus benar',fx:{kas:0,piutang:0,trust:-5,surplus:0},fxt:['neu','neu','neg','neu'],
      result:{type:'neu',title:'Rekrut ditunda',desc:'Momentum terlewat. Beberapa calon anggota memilih bergabung ke koperasi di kecamatan lain.',learn:'Administrasi yang baik penting, tapi jangan sampai menghambat pertumbuhan. AD/ART yang fleksibel dan modern memudahkan pengelolaan koperasi.'}}
   ]},
  {id:'digitalisasi',tag:'Transformasi Digital',
   title:'Digitalisasi Sistem Koperasi',
   narasi:'Transformasi digital adalah kunci modernisasi koperasi. Sistem informasi yang baik meningkatkan transparansi, efisiensi, dan kepercayaan anggota.',
   desc:'Dinas Koperasi menawarkan pelatihan dan implementasi SIKOP (Sistem Informasi Koperasi Online) — platform resmi Kemenkop yang gratis. Alternatifnya ada aplikasi berbayar Rp 6 juta/tahun dengan fitur lebih lengkap.',

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function notify(msg, type='pos'){
  const el=document.getElementById('notif');
  el.textContent=msg; el.className='notif '+type+' show';
  setTimeout(()=>{el.className='notif'},2800);
}
function fmt(n){return Math.round(n).toLocaleString('id-ID')}
function setMain(html){document.getElementById('main').innerHTML=html}

function updateStats(){
  document.getElementById('s-kas').textContent=fmt(G.kas);
  document.getElementById('s-anggota').textContent=G.anggota;
  document.getElementById('s-trust').textContent=G.trust;
  document.getElementById('s-bulan').textContent=G.bulan;
  const kasC=G.kas<10?'var(--red)':G.kas<30?'var(--amber)':'var(--green)';
  document.getElementById('bar-kas').style.cssText=`width:${Math.min(100,G.kas/120*100)}%;background:${kasC}`;
  document.getElementById('bar-anggota').style.cssText=`width:${Math.min(100,G.anggota/50*100)}%;background:var(--blue)`;
  document.getElementById('bar-trust').style.cssText=`width:${G.trust}%;background:var(--purple)`;
  document.getElementById('bar-bulan').style.cssText=`width:${G.bulan/12*100}%;background:var(--amber)`;
  document.getElementById('hdr-title').textContent=G.namaKoperasi||'Simulasi Koperasi';
  document.getElementById('phase-name').textContent=FASE_NAMES[G.fase]||'—';
  // milestones
  for(let i=0;i<5;i++){
    const el=document.getElementById('ms-'+i);
    el.className='ms '+(i<G.fase?'done':i===G.fase?'active':'locked');
  }
}

function narasi(text){
  return `<div class="narasi">
    <div class="narasi-avatar">👨‍💼</div>
    <div class="narasi-body">
      <div class="narasi-name">Pembimbing Dinas Koperasi</div>
      <div class="narasi-text">${text}</div>
    </div>
  </div>`;
}

function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function checkGameOver(){
  if(G.kas<0||G.trust<=5||G.anggota<3){
    showGameOver();return true;
  }
  return false;
}

  G.kas=parseFloat((jumlah*G.simpananPokok).toFixed(2));
  G.trust=jumlah>=50?68:jumlah>=35?60:52;
  G.log.push({bulan:'Pendirian',event:'Rekrut anggota pendiri',hasil:`${jumlah} anggota`});
  notify(`${jumlah} anggota pendiri bergabung! Kas: Rp ${fmt(G.kas)} juta`,'pos');

  fase0_step4();
}

function fase0_selesai(mode){

  notify('Koperasi resmi berdiri! Akta pendirian diproses ke Kemenkop.','pos');
  updateStats();
  setTimeout(()=>fase1_intro(),800);
}

function fase1_tagihSW(rate){
  const sw=G.simpananWajib;
  const masuk=parseFloat((G.anggota*sw*rate).toFixed(2));
  G.kas=parseFloat((G.kas+masuk).toFixed(2));
  G.trust=Math.min(100,G.trust+(rate>=1?5:rate>=0.88?2:-3));
  G.log.push({bulan:`Bulan ${G.bulan}`,event:'Simpanan wajib',hasil:`Rp ${fmt(masuk)}jt (${Math.round(rate*100)}%)`});
  notify(`Simpanan wajib terkumpul Rp ${fmt(masuk)} juta (${Math.round(rate*100)}% kepatuhan)`,'pos');
  updateStats();
  fase1_alokasiPertama();
}

function fase1_alokasiPertama(){
  G.step=2;
  setMain(`
    ${narasi('Kas awal sudah terkumpul. Kini keputusan terpenting: <strong>bagaimana dana ini diputar?</strong> Ingat — dana yang diam di kas tidak menghasilkan apa-apa. Koperasi harus memutar dana agar bisa memberi manfaat bagi anggota dan menghasilkan surplus untuk SHU.')}
    <div class="card">
      <div class="card-title">📊 Alokasi Dana Pertama Koperasi</div>
      <div class="card-sub">Total kas tersedia: <strong>Rp ${fmt(G.kas)} juta</strong>. Tentukan berapa persen yang dialokasikan ke masing-masing instrumen. Sisa menjadi kas operasional (minimum 10%).</div>
      <div class="edu-box">
        <strong>Prinsip alokasi dana koperasi yang sehat:</strong><br>
        • Simpan Pinjam: pendapatan bunga 1,5%/bulan — stabil tapi ada risiko macet<br>
        • Unit Usaha: return 5-10%/bulan — lebih tinggi, perlu manajemen aktif<br>
        • Deposito Bank: bunga 0,5%/bulan — sangat aman, return rendah<br>
        • Kas Operasional: wajib min 10% — dana darurat dan biaya operasional
      </div>
      <div id="alloc-container">
        <div class="alloc-row">
          <div class="alloc-hdr">
            <div class="alloc-name" style="color:var(--green)">💳 Simpan Pinjam ke Anggota</div>
            <div class="alloc-pct" id="pct-sp" style="color:var(--green)">${G.allocSP}%</div>
          </div>
          <input type="range" min="0" max="80" step="5" value="${G.allocSP}" id="sl-sp" oninput="updateAlloc()">
          <div class="alloc-hint" id="hint-sp"></div>
        </div>
        <div class="alloc-row">
          <div class="alloc-hdr">
            <div class="alloc-name" style="color:var(--amber)">🏪 Unit Usaha</div>
            <div class="alloc-pct" id="pct-usaha" style="color:var(--amber)">${G.allocUsaha}%</div>
          </div>
          <input type="range" min="0" max="50" step="5" value="${G.allocUsaha}" id="sl-usaha" oninput="updateAlloc()">
          <div class="alloc-hint" id="hint-usaha"></div>
        </div>
        <div class="alloc-row">
          <div class="alloc-hdr">
            <div class="alloc-name" style="color:var(--blue)">🏦 Deposito Bank</div>
            <div class="alloc-pct" id="pct-dep" style="color:var(--blue)">${G.allocDep}%</div>
          </div>
          <input type="range" min="0" max="40" step="5" value="${G.allocDep}" id="sl-dep" oninput="updateAlloc()">
          <div class="alloc-hint" id="hint-dep"></div>
        </div>
        <div class="alloc-summary" id="alloc-summary"></div>
      </div>
      <button class="btn primary" onclick="fase1_konfirmAlokasi()">Konfirmasi Alokasi Dana →</button>
    </div>`);
  updateAlloc();
}

function updateAlloc(){
  G.allocSP=parseInt(document.getElementById('sl-sp').value);
  G.allocUsaha=parseInt(document.getElementById('sl-usaha').value);
  G.allocDep=parseInt(document.getElementById('sl-dep').value);
  const kasOp=100-G.allocSP-G.allocUsaha-G.allocDep;
  const modal=G.kas;
  const spAmt=modal*G.allocSP/100, usahaAmt=modal*G.allocUsaha/100, depAmt=modal*G.allocDep/100;
  const incSP=spAmt*0.015, incUsaha=usahaAmt*0.08, incDep=depAmt*0.005;
  const total=incSP+incUsaha+incDep;
  document.getElementById('pct-sp').textContent=G.allocSP+'%';
  document.getElementById('pct-usaha').textContent=G.allocUsaha+'%';
  document.getElementById('pct-dep').textContent=G.allocDep+'%';
  document.getElementById('hint-sp').textContent=`Rp ${fmt(spAmt)}jt dipinjamkan → pendapatan bunga ≈ Rp ${incSP.toFixed(1)}jt/bln`;
  document.getElementById('hint-usaha').textContent=`Rp ${fmt(usahaAmt)}jt modal usaha → pendapatan ≈ Rp ${incUsaha.toFixed(1)}jt/bln`;
  document.getElementById('hint-dep').textContent=`Rp ${fmt(depAmt)}jt deposito → bunga ≈ Rp ${incDep.toFixed(1)}jt/bln`;
  const warn=kasOp<10?`<div style="color:var(--red);font-size:12px;margin-top:.5rem">⚠️ Kas operasional ${kasOp}% — di bawah minimum aman!</div>`:'';
  document.getElementById('alloc-summary').innerHTML=`
    <div class="alloc-sum-row"><span>💳 Pendapatan simpan pinjam/bulan</span><span style="color:var(--green)">+Rp ${incSP.toFixed(1)} juta</span></div>
    <div class="alloc-sum-row"><span>🏪 Pendapatan unit usaha/bulan</span><span style="color:var(--amber)">+Rp ${incUsaha.toFixed(1)} juta</span></div>
    <div class="alloc-sum-row"><span>🏦 Pendapatan deposito/bulan</span><span style="color:var(--blue)">+Rp ${incDep.toFixed(1)} juta</span></div>
    <div class="alloc-sum-row"><span>🔒 Kas operasional tersisa</span><span>${kasOp}% = Rp ${fmt(G.kas*kasOp/100)} juta</span></div>
    <div class="alloc-sum-row total"><span>📈 Total pendapatan/bulan</span><span style="color:var(--green)">+Rp ${total.toFixed(1)} juta</span></div>
    ${warn}`;
}

function fase1_konfirmAlokasi(){
  const kasOp=100-G.allocSP-G.allocUsaha-G.allocDep;
  if(kasOp<10){notify('Kas operasional terlalu kecil! Minimum 10%.','neg');return;}
  const modal=G.kas;
  const incSP=modal*G.allocSP/100*0.015;
  const incUsaha=modal*G.allocUsaha/100*0.08;
  const incDep=modal*G.allocDep/100*0.005;
  const totalInc=parseFloat((incSP+incUsaha+incDep).toFixed(1));
  G.kas=parseFloat((G.kas+totalInc).toFixed(1));
  G.surplus=parseFloat((G.surplus+totalInc).toFixed(1));
  G.bulan=2;
  G.log.push({bulan:'Bulan 1',event:'Alokasi dana',hasil:`Pendapatan +Rp ${totalInc}jt`});
  notify(`Alokasi aktif! Pendapatan bulan ini: +Rp ${totalInc} juta`,'pos');
  updateStats();
  fase1_bulan23();
}

let opsCount=0;
function fase2_nextEvent(){
  if(opsCount>=4){fase3_intro();return;}
  if(G.eventQueue.length===0)G.eventQueue=shuffle([...EVENTS_OPS]);
  G.currentEvent=G.eventQueue.shift();
  G.hasResult=false;
  G.bulan=Math.min(9,4+opsCount);
  opsCount++;
  updateStats();
  renderEvent(G.currentEvent, ()=>fase2_nextEvent());
}

function renderEvent(ev, nextFn){
  setMain(`
    ${narasi(ev.narasi)}
    <div class="card">
      <span class="fp neu" style="font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:.75rem;display:inline-block">${ev.tag.toUpperCase()}</span>
      <div class="card-title" style="margin-top:.5rem">${ev.title}</div>
      <div class="card-sub">${ev.desc}</div>
      <div class="edu-box">${ev.edu}</div>
      <div class="choices">
        ${ev.choices.map((c,i)=>`
        <button class="choice" onclick="pilihEvent(${i})">
          <span class="choice-title">${c.label}</span>
          <span class="choice-hint">${c.hint}</span>
          <div class="choice-fx">${c.fxLabel?c.fxLabel.map((l,j)=>`<span class="fp ${c.fxType[j]}">${l}</span>`).join(''):
            [c.fx.kas?`<span class="fp ${c.fx.kas>0?'pos':'neg'}">${c.fx.kas>0?'+':''}${c.fx.kas}jt kas</span>`:'',
             c.fx.trust?`<span class="fp ${c.fx.trust>0?'pos':'neg'}">kepercayaan ${c.fx.trust>0?'+':''}${c.fx.trust}</span>`:'',
             c.fx.surplus?`<span class="fp ${c.fx.surplus>0?'pos':'neg'}">surplus ${c.fx.surplus>0?'+':''}${c.fx.surplus}jt</span>`:''].filter(Boolean).join('')
          }</div>
        </button>`).join('')}
      </div>
    </div>`);
  window._nextEventFn=nextFn;
}

function pilihEvent(i){
  const ev=G.currentEvent;
  const c=ev.choices[i];
  const fx=c.fx;
  G.kas=Math.max(0,parseFloat((G.kas+(fx.kas||0)).toFixed(1)));
  G.anggota=Math.max(1,G.anggota+(fx.anggota||0));
  G.trust=Math.max(0,Math.min(100,G.trust+(fx.trust||0)));
  G.piutang=Math.max(0,parseFloat((G.piutang+(fx.piutang||0)).toFixed(1)));
  G.surplus=Math.max(0,parseFloat((G.surplus+(fx.surplus||0)).toFixed(1)));
  G.log.push({bulan:`Bulan ${G.bulan}`,event:ev.title,hasil:c.label});
  updateStats();
  if(checkGameOver())return;

  const r=c.result;
  const pills=[
    fx.kas?`<span class="dp ${fx.kas>0?'pos':'neg'}">Kas ${fx.kas>0?'+':''}${fx.kas}jt</span>`:'',
    fx.anggota?`<span class="dp ${fx.anggota>0?'pos':'neg'}">Anggota ${fx.anggota>0?'+':''}${fx.anggota}</span>`:'',
    fx.trust?`<span class="dp ${fx.trust>0?'pos':'neg'}">Kepercayaan ${fx.trust>0?'+':''}${fx.trust}</span>`:'',
    fx.surplus?`<span class="dp ${fx.surplus>0?'pos':'neg'}">Surplus ${fx.surplus>0?'+':''}${fx.surplus}jt</span>`:'',
  ].filter(Boolean).join('');

  setMain(`
    <div class="result ${r.type}">
      <div class="result-title">${r.type==='pos'?'✅':r.type==='neg'?'❌':'📋'} ${r.title}</div>
      <div class="result-desc">${r.desc}</div>
      <div class="delta">${pills}</div>
      <div class="learn-box"><strong>📚 Pelajaran:</strong> ${r.learn}</div>
    </div>
    <button class="btn primary" onclick="window._nextEventFn()">Lanjut →</button>`);
}

// ─── FASE 4: RAT & SHU ───────────────────────────────────────────────────────
function fase4_intro(){
  G.fase=4; G.bulan=12; updateStats();
  // tambah simpanan wajib akumulasi sebagai surplus
  const swAkum=parseFloat((G.anggota*G.simpananWajib*12*0.15).toFixed(1));
  G.surplus=parseFloat((G.surplus+swAkum).toFixed(1));

  const cadWajib=parseFloat((G.surplus*0.25).toFixed(1));
  const danaPend=parseFloat((G.surplus*0.05).toFixed(1));
  const danaSos=parseFloat((G.surplus*0.05).toFixed(1));
  const shuTotal=parseFloat((G.surplus-cadWajib-danaPend-danaSos).toFixed(1));
  const shuPerAnggota=G.anggota>0?parseFloat((shuTotal/G.anggota).toFixed(2)):0;

  setMain(`
    ${narasi('Selamat! Anda telah melewati satu tahun penuh memimpin koperasi. Kini tiba momen yang paling ditunggu anggota: <strong>Rapat Anggota Tahunan (RAT)</strong> untuk menyampaikan laporan dan membagikan Sisa Hasil Usaha.')}
    <div class="card">
      <div class="card-title">🏛️ Rapat Anggota Tahunan (RAT)</div>
      <div class="card-sub">RAT adalah forum tertinggi koperasi. Pengurus menyampaikan laporan pertanggungjawaban, anggota mengevaluasi kinerja, dan SHU dibagikan.</div>
      <div class="edu-box">
        <strong>Agenda RAT wajib (UU No.25/1992):</strong><br>
        1. Laporan pertanggungjawaban pengurus<br>
        2. Laporan pengawas<br>
        3. Neraca dan perhitungan hasil usaha<br>
        4. Pembagian SHU<br>
        5. Rencana kerja tahun berikutnya<br>
        6. Pemilihan pengurus/pengawas (jika masa jabatan habis)
      </div>
    </div>
    <div class="card">
      <div class="card-title">💰 Perhitungan SHU — Waterfall Alokasi</div>
      <div class="card-sub">SHU bukan "keuntungan" biasa — ini surplus yang dikembalikan ke anggota sesuai kontribusi masing-masing.</div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:1rem">
        <div class="wf-row gross"><span>📈 Total surplus setahun</span><span>Rp ${fmt(G.surplus)} juta</span></div>
        <div class="wf-row cut"><span>🏦 Dana cadangan wajib — 25% (UU)</span><span>− Rp ${fmt(cadWajib)} juta</span></div>
        <div class="wf-row cut"><span>🎓 Dana pendidikan anggota — 5%</span><span>− Rp ${fmt(danaPend)} juta</span></div>
        <div class="wf-row cut"><span>❤️ Dana sosial — 5%</span><span>− Rp ${fmt(danaSos)} juta</span></div>
        <div class="wf-row net"><span>💵 SHU yang dapat dibagikan</span><span>Rp ${fmt(shuTotal)} juta</span></div>
        <div class="wf-row info"><span>👥 Dibagi ${G.anggota} anggota aktif</span><span>≈ Rp ${fmt(shuPerAnggota)} juta/anggota</span></div>
      </div>
      <div class="edu-box">
        <strong>Formula SHU per anggota:</strong><br>
        SHU = (Simpanan anggota ÷ Total simpanan × 40%) + (Transaksi anggota ÷ Total transaksi × 60%)<br><br>
        Artinya: anggota yang <strong>lebih aktif bertransaksi</strong> mendapat SHU lebih besar — bukan sekadar yang simpanannya lebih besar.
      </div>
      <div class="card-sub"><strong>Bagaimana SHU akan dibagikan?</strong></div>
      <div class="choices">
        <button class="choice" onclick="fase4_shu('penuh',${shuTotal},${cadWajib})">
          <span class="choice-title">Bagikan SHU penuh — Rp ${fmt(shuTotal)} juta</span>
          <span class="choice-hint">Anggota paling puas. Kas berkurang tapi kepercayaan melonjak.</span>
          <div class="choice-fx"><span class="fp neg">kas −${fmt(shuTotal)}jt</span><span class="fp pos">kepercayaan +20</span><span class="fp pos">cadangan +${fmt(cadWajib)}jt</span></div>
        </button>
        <button class="choice" onclick="fase4_shu('sebagian',${shuTotal*0.5},${cadWajib})">
          <span class="choice-title">Bagikan 50% SHU — Rp ${fmt(shuTotal*0.5)} juta, tahan 50% untuk modal</span>
          <span class="choice-hint">Seimbang: anggota puas, modal tumbuh.</span>
          <div class="choice-fx"><span class="fp neg">kas −${fmt(shuTotal*0.5)}jt</span><span class="fp pos">kepercayaan +12</span><span class="fp pos">modal bertumbuh</span></div>
        </button>
        <button class="choice" onclick="fase4_shu('tahan',0,${cadWajib})">
          <span class="choice-title">Tahan semua SHU untuk reinvestasi koperasi</span>
          <span class="choice-hint">Modal besar, tapi anggota tidak merasakan manfaat langsung.</span>
          <div class="choice-fx"><span class="fp neu">kas tetap</span><span class="fp neg">kepercayaan −8</span><span class="fp pos">modal investasi besar</span></div>
        </button>
      </div>
    </div>`);
}

function fase4_shu(mode, shuDibagi, cadangan){
  G.kas=Math.max(0,parseFloat((G.kas-shuDibagi).toFixed(1)));
  G.cadangan=parseFloat((G.cadangan+cadangan).toFixed(1));
  G.trust=Math.min(100,G.trust+(mode==='penuh'?20:mode==='sebagian'?12:-8));
  G.log.push({bulan:'Bulan 12',event:'Pembagian SHU',hasil:`Mode: ${mode}, Rp ${fmt(shuDibagi)}jt dibagikan`});
  updateStats();
  showGameOver();
}

// ─── GAME OVER ────────────────────────────────────────────────────────────────
function showGameOver(){
  const score=Math.round(G.kas*0.3+G.anggota*3+G.trust*1.5+G.cadangan+G.surplus*0.4);
  let emoji,title,sub,grade,gradeColor;
  if(G.kas<=0){emoji='😰';title='Koperasi Bangkrut';sub='Kas koperasi habis. Koperasi tidak dapat melanjutkan operasional dan terpaksa dibubarkan.';grade='Gagal';gradeColor='var(--red)';}
  else if(G.trust<=5){emoji='😞';title='Kepercayaan Anggota Hilang';sub='Anggota tidak lagi mempercayai pengurus. Rapat anggota luar biasa digelar dan pengurus diganti.';grade='Gagal';gradeColor:'var(--red)';}
  else if(G.anggota<3){emoji='😟';title='Koperasi Hampir Bubar';sub='Anggota tersisa terlalu sedikit untuk menjalankan koperasi secara efektif.';grade='Gagal';gradeColor='var(--red)';}
  else if(score>=380){emoji='🏆';title='Koperasi Teladan Nasional!';sub='Koperasi yang Anda pimpin menjadi contoh terbaik digitalisasi koperasi dan diundang presentasi di Kemenkop RI.';grade='Sangat Luar Biasa';gradeColor='var(--green)';}
  else if(score>=270){emoji='🥇';title='Koperasi Sehat & Berkembang';sub='Setahun kepemimpinan yang solid. Anggota puas, kas sehat, cadangan kuat, dan koperasi siap tumbuh lebih besar.';grade='Sangat Baik';gradeColor='var(--green)';}
  else if(score>=170){emoji='👍';title='Koperasi Beroperasi dengan Baik';sub='Koperasi berjalan lancar dengan beberapa area yang masih bisa ditingkatkan di tahun berikutnya.';grade='Baik';gradeColor='var(--blue)';}
  else{emoji='📋';title='Koperasi Perlu Pembenahan';sub='Koperasi masih berdiri, namun beberapa indikator menunjukkan perlunya perbaikan serius dalam tata kelola.';grade='Cukup';gradeColor='var(--amber)';}

  document.getElementById('main').innerHTML=`
    <div class="gameover">
      <span class="go-emoji">${emoji}</span>
      <div class="go-title">${title}</div>
      <div class="go-sub">${sub}</div>
      <div class="go-grid">
        <div class="go-stat"><div class="go-stat-l">💰 Kas Akhir</div><div class="go-stat-v" style="color:var(--green)">Rp ${fmt(G.kas)}jt</div></div>
        <div class="go-stat"><div class="go-stat-l">👥 Anggota</div><div class="go-stat-v" style="color:var(--blue)">${G.anggota} org</div></div>
        <div class="go-stat"><div class="go-stat-l">⭐ Kepercayaan</div><div class="go-stat-v" style="color:var(--purple)">${G.trust}/100</div></div>
        <div class="go-stat"><div class="go-stat-l">🏦 Cadangan</div><div class="go-stat-v" style="color:var(--amber)">Rp ${fmt(G.cadangan)}jt</div></div>
        <div class="go-stat"><div class="go-stat-l">📈 Total Surplus</div><div class="go-stat-v" style="color:var(--green)">Rp ${fmt(G.surplus)}jt</div></div>
        <div class="go-stat"><div class="go-stat-l">📋 Keputusan</div><div class="go-stat-v">${G.log.length}x</div></div>
      </div>
      <div class="score-wrap">
        <div style="font-size:13px;color:var(--text2);margin-bottom:4px">Nilai Kepemimpinan Koperasi</div>
        <div class="score-num">${Math.max(0,score)}</div>
        <div><span class="score-grade" style="background:${gradeColor}20;color:${gradeColor};border:1px solid ${gradeColor}50">${grade}</span></div>
      </div>
      <div style="background:var(--blue-light);border-radius:var(--r);padding:.875rem 1rem;margin:.75rem 0;font-size:12px;color:var(--blue-dark);line-height:1.65;text-align:left">
        <strong>📚 Pesan penutup:</strong> Koperasi yang berhasil bukan yang terbesar modalnya, tapi yang paling konsisten menerapkan prinsip-prinsip koperasi: keanggotaan sukarela, pengelolaan demokratis, pembagian SHU yang adil, kemandirian, dan pendidikan anggota. Itulah yang membedakan koperasi dari badan usaha lainnya.
      </div>
      <button class="btn primary" style="max-width:260px;margin:0 auto" onclick="location.reload()">🔄 Mulai Ulang Simulasi</button>
    </div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateStats();
fase0_intro();
</script>
</body>
</html>
